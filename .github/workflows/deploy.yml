name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          # Baked into client bundle at build time (see src/lib/baidu-tongji.ts)
          VITE_BAIDU_TONGJI_ID: ${{ secrets.VITE_BAIDU_TONGJI_ID }}
        run: pnpm build

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.SSH_PORT || 22 }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Rsync build output
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          RSYNC_SSH="ssh -i ~/.ssh/deploy_key -p ${SSH_PORT} -o StrictHostKeyChecking=yes"
          rsync -avzr --delete \
            -e "${RSYNC_SSH}" \
            .output/ \
            "${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/.output/"
          rsync -avz \
            -e "${RSYNC_SSH}" \
            ecosystem.config.cjs \
            "${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/"

      - name: Restart PM2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            if pm2 describe china >/dev/null 2>&1; then
              pm2 restart china --update-env
            else
              pm2 start ecosystem.config.cjs
              pm2 save
            fi
            pm2 status china
